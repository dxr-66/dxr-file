backend:
  name: github
  repo: dxr-66/dxr-file
  branch: main
  auth_type: pkce
  app_id: Ov23lik3aD761luV5EU4


media_folder: "docs/assets/images"
public_folder: "/assets/images"

locale: "zh_Hans"

collections:
  - name: "python_notes"
    label: "🐍 Python 学习笔记"
    folder: "docs/学习笔记/Python"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
      - label: "学习日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
      - label: "状态"
        name: "status"
        widget: "select"
        options:
          - { label: "✅ 已完成", value: "✅ 已完成" }
          - { label: "🔄 学习中", value: "🔄 学习中" }
          - { label: "📋 计划中", value: "📋 计划中" }
        default: "🔄 学习中"
      - label: "标签"
        name: "tags"
        widget: "list"
      - label: "文章内容"
        name: "body"
        widget: "markdown"

  - name: "opencv_notes"
    label: "📷 OpenCV 学习笔记"
    folder: "docs/学习笔记/OpenCV"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
      - label: "学习日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
      - label: "状态"
        name: "status"
        widget: "select"
        options:
          - { label: "✅ 已完成", value: "✅ 已完成" }
          - { label: "🔄 学习中", value: "🔄 学习中" }
          - { label: "📋 计划中", value: "📋 计划中" }
        default: "🔄 学习中"
      - label: "标签"
        name: "tags"
        widget: "list"
      - label: "文章内容"
        name: "body"
        widget: "markdown"

  - name: "flask_notes"
    label: "🌶️ Flask 学习笔记"
    folder: "docs/学习笔记/Flask"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
      - label: "学习日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
      - label: "状态"
        name: "status"
        widget: "select"
        options:
          - { label: "✅ 已完成", value: "✅ 已完成" }
          - { label: "🔄 学习中", value: "🔄 学习中" }
          - { label: "📋 计划中", value: "📋 计划中" }
        default: "🔄 学习中"
      - label: "标签"
        name: "tags"
        widget: "list"
      - label: "文章内容"
        name: "body"
        widget: "markdown"

  - name: "wechat_articles"
    label: "📰 公众号收藏"
    folder: "docs/公众号收藏"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
      - label: "来源公众号"
        name: "source"
        widget: "string"
      - label: "原文链接"
        name: "link"
        widget: "string"
      - label: "收藏日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
      - label: "标签"
        name: "tags"
        widget: "list"
      - label: "摘要"
        name: "summary"
        widget: "text"
      - label: "文章内容"
        name: "body"
        widget: "markdown"

  - name: "code_snippets"
    label: "💻 代码片段"
    folder: "docs/代码片段"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
      - label: "语言"
        name: "language"
        widget: "select"
        options:
          - "Python"
          - "OpenCV"
          - "Flask"
          - "JavaScript"
          - "Shell"
        default: "Python"
      - label: "依赖库"
        name: "dependencies"
        widget: "string"
      - label: "标签"
        name: "tags"
        widget: "list"
      - label: "代码内容"
        name: "body"
        widget: "markdown"

  - name: "pages"
    label: "📄 站点页面"
    files:
      - label: "首页"
        name: "home"
        file: "docs/index.md"
        fields:
          - label: "标题"
            name: "title"
            widget: "string"
          - label: "内容"
            name: "body"
            widget: "markdown"
      - label: "学习进度"
        name: "progress"
        file: "docs/progress.md"
        fields:
          - label: "标题"
            name: "title"
            widget: "string"
          - label: "内容"
            name: "body"
            widget: "markdown"
      - label: "关于"
        name: "about"
        file: "docs/about.md"
        fields:
          - label: "标题"
            name: "title"
            widget: "string"
          - label: "内容"
            name: "body"
            widget: "markdown"